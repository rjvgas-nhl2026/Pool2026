<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Selection</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        h1 {
            color: #333;
            margin-bottom: 2rem;
        }

        .button-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-browser {
            background-color: #3498db;
        }

        .btn-browser:hover {
            background-color: #2980b9;
        }

        .btn-mobile {
            background-color: #2ecc71;
        }

        .btn-mobile:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <h1>Choose Your View</h1>

    <div class="button-container">
        <a href="browser.html" class="btn btn-browser">Desktop View</a>
        
        <a href="stanley-cup-2026-mobile.html" class="btn btn-mobile">Mobile View</a>
    </div>

</body>
</html>
